services:
  # --- 1. POSTGRESQL (DATABASE UTAMA) ---
  db:
    image: postgres:15-alpine
    container_name: mkn_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - net_internal

  # --- 2. MINIO (GUDANG FOTO TIPE S3) ---
  minio:
    image: minio/minio
    container_name: mkn_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - net_internal
      - net_public

  # --- 3. MOCK AI SERVICE ---
  mock_ai:
    build:
      context: ./jatim-sosial-backend
      dockerfile: Dockerfile
    container_name: mkn_mock_ai
    restart: always
    command: uvicorn mock_ai:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    volumes:
      - ./jatim-sosial-backend:/app
    depends_on:
      - db
    networks:
      - net_internal

  # --- 4. BACKEND API SERVICE ---
  backend:
    build:
      context: ./jatim-sosial-backend
      dockerfile: Dockerfile
    container_name: mkn_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AI_BASE_URL=http://mock_ai:8001
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      - AI_RUNPOD_URL=${AI_RUNPOD_URL}
      - AI_RUNPOD_TOKEN=${AI_RUNPOD_TOKEN}
    volumes:
      - ./jatim-sosial-backend:/app
    depends_on:
      - db
      - minio
      - mock_ai
    networks:
      - net_public
      - net_internal
    develop:
      watch:
        - path: ./jatim-sosial-backend
          action: sync+restart
          target: /app
          ignore:
            - ./jatim-sosial-backend/__pycache__
            - ./jatim-sosial-backend/requirements.txt
        - path: ./jatim-sosial-backend/requirements.txt
          action: rebuild

  # --- 5. FRONTEND WEB CLIENT ---
  frontend:
    build:
      context: ./jatim-sosial-frontend
      dockerfile: Dockerfile
      target: dev
    container_name: mkn_frontend
    restart: always
    ports:
      - "80:5173"
    volumes:
      - ./jatim-sosial-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - net_public
    develop:
      watch:
        - path: ./jatim-sosial-frontend/src
          action: sync
          target: /app/src
        - path: ./jatim-sosial-frontend/index.html
          action: sync
          target: /app/index.html
        - path: ./jatim-sosial-frontend/vite.config.ts
          action: sync
          target: /app/vite.config.ts
        - path: ./jatim-sosial-frontend/package.json
          action: rebuild
        - path: ./jatim-sosial-frontend/package-lock.json
          action: rebuild

volumes:
  pgdata:
  miniodata:

# --- NETWORK SEGMENTATION ---
networks:
  net_public:
    driver: bridge
  net_internal:
    driver: bridge
