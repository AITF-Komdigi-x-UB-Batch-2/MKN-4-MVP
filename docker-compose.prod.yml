services:
  # --- 1. POSTGRESQL (DATABASE UTAMA) ---
  db:
    image: postgres:15-alpine
    container_name: mkn_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - net_internal

  # --- 2. MINIO (GUDANG FOTO TIPE S3) ---
  minio:
    image: minio/minio
    container_name: mkn_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data
    networks:
      - net_internal
      - net_public

  # --- 3. MOCK AI SERVICE ---
  mock_ai:
    build:
      context: ./jatim-sosial-backend
      dockerfile: Dockerfile
    container_name: mkn_mock_ai
    restart: always
    command: uvicorn mock_ai:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    networks:
      - net_internal

  # --- 4. BACKEND API SERVICE ---
  backend:
    build:
      context: ./jatim-sosial-backend
      dockerfile: Dockerfile
    container_name: mkn_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AI_BASE_URL=http://mock_ai:8001
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      - AI_RUNPOD_URL=${AI_RUNPOD_URL}
      - AI_RUNPOD_TOKEN=${AI_RUNPOD_TOKEN}
    depends_on:
      - db
      - minio
      - mock_ai
    networks:
      - net_public
      - net_internal

  # --- 5. FRONTEND WEB CLIENT (PRODUCTION) ---
  frontend:
    build:
      context: ./jatim-sosial-frontend
      dockerfile: Dockerfile
      target: prod
    container_name: mkn_frontend
    restart: always
    ports:
      - "8005:80"
    depends_on:
      - backend
    networks:
      - net_public

volumes:
  pgdata:
  miniodata:

networks:
  net_public:
    driver: bridge
  net_internal:
    driver: bridge
